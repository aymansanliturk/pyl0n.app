<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="div" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c4b2d4" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#c4b2d4" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#7bbfb5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7bbfb5" stop-opacity="0"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;family=Outfit:wght@300;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- ── Network graph ── -->
  <line x1="8"  y1="40" x2="28" y2="16" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="8"  y1="40" x2="28" y2="40" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="8"  y1="40" x2="28" y2="64" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="50" y2="40" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="40" x2="50" y2="16" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="40" x2="50" y2="64" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="64" x2="50" y2="40" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="16" x2="72" y2="40" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="40" x2="72" y2="16" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="64" x2="72" y2="40" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="40" x2="88" y2="40" stroke="#647d98" stroke-width="2" stroke-linecap="round"/>

  <circle cx="8"  cy="40" r="7"  fill="#3d5082"/>
  <circle cx="28" cy="16" r="5"  fill="#7bbfb5"/>
  <circle cx="28" cy="40" r="5"  fill="#c4b2d4"/>
  <circle cx="28" cy="64" r="5"  fill="#e8b898"/>
  <circle cx="50" cy="16" r="5"  fill="#e8b898"/>
  <circle cx="50" cy="40" r="7"  fill="#4dbfbd"/>
  <circle cx="50" cy="64" r="5"  fill="#c4b2d4"/>
  <circle cx="72" cy="16" r="5"  fill="#c4b2d4"/>
  <circle cx="72" cy="40" r="5"  fill="#7bbfb5"/>
  <circle cx="72" cy="64" r="5"  fill="#e8b898"/>
  <circle cx="88" cy="40" r="7"  fill="#3d5082"/>

  <!-- ── Gradient divider ── -->
  <rect x="104" y="8" width="1.5" height="64" fill="url(#div)"/>

  <!-- ── Wordmark ── -->
  <text x="118" y="46"
    font-family="Outfit, sans-serif"
    font-weight="700"
    font-size="28"
    fill="#1a2035"
    letter-spacing="0.5">Bid Forecast<tspan fill="#4dbfbd">.</tspan></text>
  <text x="119" y="62"
    font-family="DM Mono, monospace"
    font-weight="400"
    font-size="10"
    fill="#8a97a8"
    letter-spacing="3">TOOLS</text>
</svg>
