<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrgCast · PYL0N</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style id="page-size-style">@page { size: A4 landscape; margin: 10mm; }</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #f5f4f0; --surface: #ffffff; --border: #e0ddd6;
    --text:    #1a1916; --muted:   #6b6860; --faint:  #a8a49e;
    --accent:  #2c4e87; --accent2: #1e3a6b; --brand:  #2c4e87; --green: #107c41; --green-dk: #0a6032; --red: #c0392b;
  }

/* ── Dark mode ── */
[data-theme="dark"] {
  --bg: #1a1917;
  --surface: #242320;
  --border: #3a3835;
  --text: #e8e6e1;
  --muted: #9b9891;
  --faint: #6b6860;
  --accent: #5b82c4;
  --accent2: #4a6da8;
  --green: #22a85a;
  --green-dk: #1a8a47;
}
[data-theme="dark"] #toolbar {
  background: rgba(36,35,32,0.95);
}
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

  /* ── Unified Toolbar ── */
  #toolbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .tb-left  { display: flex; align-items: center; gap: 12px; }
  .tb-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .logo-icon {
    width: 28px; height: 28px; background: var(--accent2); border-radius: 7px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-icon svg { width: 14px; height: 14px; }
  .tool-name { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
  .tool-tag  { font-size: 9px; font-weight: 600; color: var(--faint); letter-spacing: 1px; text-transform: uppercase; }
  .tb-sep    { width: 1px; height: 22px; background: var(--border); }
  .tb-btn {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    padding: 6px 12px; border-radius: 7px; border: 1.5px solid var(--border);
    background: var(--bg); color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .tb-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff; }
  .tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .tb-btn.primary:hover { background: var(--accent2); }
  .tb-btn.green { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }
  .tb-btn.green:hover { background: var(--green-dk); }
  .tb-btn:disabled { opacity: 0.35; pointer-events: none; }
  .save-confirm { font-size: 10px; color: var(--green); display: none; font-weight: 600; }
  .kb-hint { font-size:11px; color:var(--text); opacity:0.45; margin-left:auto; white-space:nowrap; }

/* ── EDITOR ── */
  #editor { max-width:1500px; margin:0 auto; padding:24px 28px 60px; }


  .section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:14px; }
  .section-title { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--faint); margin-bottom:14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .fields { display:grid; gap:12px; }
  .f2 { grid-template-columns:1fr 1fr; }
  .f3 { grid-template-columns:1fr 1fr 1fr; }

  label { display:flex; flex-direction:column; gap:5px; font-size:11px; font-weight:500; color:var(--muted); }
  input[type="text"], select { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); background:#faf9f7; border:1px solid var(--border); border-radius:8px; padding:10px 12px; outline:none; transition:border-color 0.15s; }
  input:focus, select:focus { border-color:var(--accent); background:#fff; }

  .node-table { width:100%; border-collapse:collapse; }
  .node-table thead th { font-size:9px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--faint); padding:0 4px 8px; text-align:left; }
  .node-table tbody tr { border-top:1px solid #f0ede8; }
  .node-table td { padding:5px 3px; vertical-align:middle; }
  .node-table input, .node-table select { width:100%; padding:5px 7px; font-size:12px; }

  .drag-handle { cursor:grab; color:#ccc; font-size:14px; padding:0 3px; user-select:none; }
  .drag-handle:active { cursor:grabbing; }
  .node-row.dragging  { opacity:0.35; background:#f0f4fa !important; }
  .node-row.drag-over { border-top:2px solid var(--accent); }

  input[type="color"] { width:26px; height:26px; border:1px solid var(--border); border-radius:3px; padding:2px; cursor:pointer; background:#faf9f7; flex-shrink:0; }
  .chex { font-family:'DM Mono',monospace; font-size:9px; color:#bbb; }
  .color-wrap { display:flex; align-items:center; gap:4px; }

  .btn-del { background:none; border:1px solid var(--border); border-radius:4px; width:24px; height:24px; cursor:pointer; color:#c0bdb6; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
  .btn-del:hover { border-color:#e05555; color:#e05555; background:#fff5f5; }

  .vacancy-row { background:#fdf8f0 !important; }
  .vacancy-badge-editor { font-size:8px; font-weight:700; background:#fff3cd; color:#856404; border:1px solid #ffc107; padding:1px 6px; border-radius:10px; white-space:nowrap; }

  .add-row { display:flex; gap:8px; margin-top:10px; }
  .btn-add { flex:1; background:none; border:1.5px dashed var(--border); border-radius:6px; padding:8px 12px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.15s; }
  .btn-add:hover { border-color:var(--accent); color:var(--accent); background:#f0f4fa; }

  .actions { display:flex; gap:12px; margin-top:8px; }
  .btn-generate { flex:1; background:var(--accent); color:#fff; border:none; border-radius:7px; padding:13px 24px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .btn-generate:hover { background:var(--accent2); }
  .btn-secondary { background:var(--surface); color:var(--muted); border:1px solid var(--border); border-radius:7px; padding:12px 18px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; }
  .btn-secondary:hover { border-color:var(--text); color:var(--text); }
  .btn-primary { font-family:'DM Sans',sans-serif; background:var(--accent); color:#fff; border:none; border-radius:7px; padding:9px 20px; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-green   { font-family:'DM Sans',sans-serif; background:var(--green); color:#fff; border:none; border-radius:7px; padding:9px 20px; font-size:13px; font-weight:600; cursor:pointer; transition:filter 0.15s; }
  .btn-green:hover { filter:brightness(0.9); }

  /* ── OUTPUT ── */
  #output { display:none; padding:28px 36px; }
  .print-bar { display:flex; gap:10px; margin-bottom:20px; align-items:center; }

  .chart-header { display:flex; align-items:center; border-bottom:2px solid var(--text); padding-bottom:12px; margin-bottom:20px; gap:16px; }
  .title-block { flex:1; }
  .title-block h1 { font-size:17px; font-weight:600; letter-spacing:-0.3px; }
  .title-block .sub { font-size:11px; color:var(--muted); margin-top:3px; }
  .header-right { text-align:right; flex-shrink:0; }
  .chart-meta { font-family:'DM Mono',monospace; font-size:9.5px; color:var(--faint); line-height:1.8; }

  /* Tree container — nodes absolutely positioned, SVG overlay for lines */
  .org-wrap { overflow:auto; padding-bottom:12px; }
  .org-canvas { position:relative; margin:0 auto; }
  .org-canvas svg.connectors { position:absolute; top:0; left:0; pointer-events:none; }

  /* Node card */
  .org-node { position:absolute; border-radius:8px; overflow:hidden; border:1px solid rgba(0,0,0,0.1); box-shadow:0 1px 4px rgba(0,0,0,0.08); background:#fff; }
  .org-node.compact .node-body { padding:6px 10px 7px; }
  .org-node.vacancy { border-style:dashed; border-width:2px; background:#fdf8f0; }

  .node-top { height:5px; }
  .node-body { padding:9px 12px 10px; }
  .node-role-tag { font-size:7px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; margin-bottom:4px; opacity:0.75; }
  .node-name { font-size:11.5px; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:2px; }
  .node-name.vacancy-name { font-style:italic; color:#aaa; }
  .node-title-txt { font-size:9.5px; color:var(--muted); line-height:1.3; margin-bottom:4px; }
  .node-company-tag { display:inline-block; font-size:7.5px; font-weight:700; letter-spacing:0.4px; padding:1px 6px; border-radius:10px; text-transform:uppercase; }
  .vacancy-label { display:inline-block; font-size:7px; font-weight:700; letter-spacing:0.5px; padding:1px 6px; border-radius:10px; background:#fff3cd; color:#856404; border:1px solid #ffc107; text-transform:uppercase; }

  /* Scale wrapper */
  .org-scale-wrap { transform-origin:top center; }

  /* Legend */
  .out-legend { margin-top:16px; display:flex; flex-wrap:wrap; gap:5px 18px; align-items:center; }
  .out-li { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); }
  .out-ld { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .vacancy-legend-icon { width:12px; height:12px; border:2px dashed #b36a00; border-radius:2px; flex-shrink:0; }
  .chart-watermark { text-align:right; margin-top:10px; font-family:'DM Mono',monospace; font-size:8px; color:#d0cdc8; letter-spacing:1px; text-transform:uppercase; }

  @media print {
    #editor    { display:none !important; visibility:hidden !important; }
    #output    { display:block !important; visibility:visible !important; }
    .print-bar { display:none !important; }
    .no-print  { display:none !important; }
    body { background:#fff; }
    .org-node { box-shadow:none; }
  }
</style>
</head>
<body>
<div id="toolbar" class="no-print">
  <div class="tb-left">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="11" rx="1.5" stroke="white" stroke-width="1.5"/><line x1="5" y1="16" x2="13" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="13" x2="9" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="5" y1="6"  x2="13" y2="6"  stroke="white" stroke-width="1.2" stroke-linecap="round"/><line x1="5" y1="9"  x2="10" y2="9"  stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg>
    </div>
    <div>
      <div class="tool-name">OrgCast</div>
      <div class="tool-tag">Organisation Chart</div>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="location.href='index.html'">← Dashboard</button>
  </div>
  <div class="tb-right">
    <button class="tb-btn active" onclick="setFormat('A4')" data-fmt="A4">A4</button>
    <button class="tb-btn" onclick="setFormat('A3')" data-fmt="A3">A3</button>
    <button class="tb-btn" onclick="setFormat('screen')" data-fmt="screen">Screen</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="compact-btn" onclick="toggleCompact()">Compact</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-undo" onclick="undo()" disabled>↩ Undo</button>
    <button class="tb-btn" id="btn-redo" onclick="redo()" disabled>↪ Redo</button>
    <div class="tb-sep"></div>
    <button class="tb-btn green" onclick="exportExcel()">⬇ Export Excel</button>
    <button class="tb-btn" onclick="exportHTML()">⬇ Export HTML</button>
    <button class="tb-btn" onclick="exportPNG()">⬇ PNG</button>
    <button class="tb-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle dark mode" style="font-size:14px;padding:4px 8px;border:none;background:transparent;cursor:pointer;">🌙</button>
    <div style="position:relative;display:inline-block;"><button class="tb-btn" id="backup-btn" onclick="_showBackups()" style="font-size:11px;">⏱ Backups</button></div>
    <span id="autosave-label" style="font-size:10px;color:var(--faint);"></span>
    <span class="save-confirm" id="save-confirm">✓ Saved!</span>
    <span class="kb-hint">Ctrl+S save · Ctrl+E PDF</span>
  </div>
</div>

<!-- ══════════════════ EDITOR ══════════════════ -->
<div id="editor">

  <!-- Chart info -->
  <div class="section">
    <div class="section-title">Chart Information</div>
    <div class="fields f3">
      <label>Chart Title
        <input type="text" id="chart-title" value="Project Organisation Chart"
          oninput="const _v=this.value.trim();if(_v&&_v!=='Project Name'&&_v!=='Project Organisation Chart')SuiteManager.write({projectName:_v},'orgcast')">
      </label>
      <label>Project No. <input type="text" id="proj-num" placeholder="e.g. PRJ-001" oninput="_scheduleSnap(); SuiteManager.write({projNum:this.value.trim()},'orgcast')"></label>
      <label>Revision <input type="text" id="chart-rev"  value="Rev. 1.0"></label>
      <label>Date     <input type="text" id="chart-date" value=""></label>
    </div>
  </div>

  <!-- People -->
  <div class="section">
    <div class="section-title">Team Members</div>
    <table class="node-table">
      <thead><tr>
        <th style="width:3%"></th>
        <th style="width:5%">Type</th>
        <th style="width:18%">Name</th>
        <th style="width:18%">Title / Position</th>
        <th style="width:12%">Role</th>
        <th style="width:13%">Company</th>
        <th style="width:13%">Reports To</th>
        <th style="width:10%">Color</th>
        <th style="width:4%"></th>
      </tr></thead>
      <tbody id="people-body"></tbody>
    </table>
    <div class="add-row">
      <button class="btn-add" onclick="addPerson({})">+ Add Person</button>
      <button class="btn-add" onclick="addPerson({vacancy:true})" style="border-color:#f5c518;color:#856404;flex:0 0 auto;padding:8px 18px;">+ Vacancy</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn-generate" onclick="generate()">Generate Chart →</button>
  </div>
</div>

<!-- ══════════════════ OUTPUT ══════════════════ -->
<div id="output">
  <div class="print-bar no-print">
    <button class="btn-secondary" onclick="goBack()">← Edit Data</button>
    <button class="btn-generate" style="flex:none;padding:10px 20px;font-size:13px;" onclick="window.print()">🖨 Print</button>
    <button class="btn-generate" style="flex:none;padding:10px 20px;font-size:13px;background:#c0392b;" onclick="exportPDF()">⬇ PDF</button>
  </div>
  <div class="chart-header">
      <div id="print-logo" style="flex-shrink:0;"></div>
    <div class="title-block">
      <h1 id="out-title"></h1>
      <div class="sub" id="out-sub"></div>
    </div>
    <div class="header-right">
      <div id="print-customer-logo" style="margin-bottom: 6px;"></div>
      <div class="chart-meta" id="out-meta"></div>
    </div>
  </div>
  <div class="org-wrap">
    <div class="org-scale-wrap" id="org-scale-wrap">
      <div class="org-canvas" id="org-canvas"></div>
    </div>
  </div>
  <div class="out-legend" id="out-legend"></div>
  <div class="chart-watermark">Generated with PYL0N Org · Project Organisation Intelligence</div>
</div>

<script>
/* ══ SuiteManager ══════════════════════════════════════════════════
   Central synchronisation utility for the Bid Forecast Suite.
   Manages bidcast_suite_sync (project meta, phases, team) and
   bidcast_logo (company logo as base64 dataURL).
═══════════════════════════════════════════════════════════════════ */
const SuiteManager = (() => {
  const SYNC_KEY = 'bidcast_suite_sync';
  const LOGO_KEY = 'bidcast_logo';
  const CUSTOMER_LOGO_KEY = 'bidcast_customer_logo';
  function read() {
    try { return JSON.parse(localStorage.getItem(SYNC_KEY) || '{}'); } catch { return {}; }
  }
  function write(patch, source) {
    try {
      const next = { ...read(), ...patch, _ts: Date.now(), _src: source };
      localStorage.setItem(SYNC_KEY, JSON.stringify(next));
      return next;
    } catch { return {}; }
  }
  function getLogo() { return localStorage.getItem(LOGO_KEY) || null; }
  function getCustomerLogo() { return localStorage.getItem(CUSTOMER_LOGO_KEY) || null; }
  function setLogo(dataUrl) { localStorage.setItem(LOGO_KEY, dataUrl); write({ _logoTs: Date.now() }, 'logo'); }
  function removeLogo() { localStorage.removeItem(LOGO_KEY); write({ _logoTs: Date.now() }, 'logo'); }
  function onUpdate(cb) {
    window.addEventListener('storage', e => {
      if (e.key === SYNC_KEY || e.key === LOGO_KEY || e.key === CUSTOMER_LOGO_KEY) cb(read(), e.key);
    });
  }
  function updateBadge(el) {
    if (!el) return;
    const sync = read();
    if (sync._ts) {
      const s = Math.round((Date.now() - sync._ts) / 1000);
      el.textContent = '↻ Synced ' + (s < 5 ? 'just now' : s < 60 ? s + 's ago' : Math.round(s / 60) + 'm ago');
      el.style.display = 'inline';
    }
  }
  return { read, write, getLogo, getCustomerLogo, setLogo, removeLogo, onUpdate, updateBadge };
})();

/* ── Logo (stored in bidcast_logo, shared across all tools) ── */
function saveLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { SuiteManager.setLogo(e.target.result); updateLogoUI(); };
  reader.readAsDataURL(file);
}
function clearLogo() {
  SuiteManager.removeLogo();
  const inp = document.getElementById('logo-input');
  if (inp) inp.value = '';
  updateLogoUI();
}
function updateLogoUI() {
  // 1. Company Logo (Left)
  const logo = SuiteManager.getLogo();
  const pl = document.getElementById('print-logo');
  if (pl) pl.innerHTML = logo ? `<img src="${logo}" style="height:36px;max-width:150px;object-fit:contain;display:block;">` : '';
  // 2. Customer Logo (Right)
  const custLogo = SuiteManager.getCustomerLogo();
  const pcl = document.getElementById('print-customer-logo');
  if (pcl) pcl.innerHTML = custLogo ? `<img src="${custLogo}" style="height:36px;max-width:150px;object-fit:contain;display:block;margin-left:auto;">` : '';
  // Dashboard Sync UI (Editor View)
  const st = document.getElementById('logo-status');
  const cl = document.getElementById('logo-clear');
  if (st) st.style.display = logo ? 'inline' : 'none';
  if (cl) cl.style.display = logo ? 'inline-flex' : 'none';
}


  const ROLES = [
    { key:'bid-sales',   label:'Bid & Sales Mgr',     color:'#7b4fa6' },
    { key:'contract',    label:'Contract Mgr',         color:'#8a3a2a' },
    { key:'pm',          label:'Project Mgr',          color:'#2c4e87' },
    { key:'planner',     label:'Planner',              color:'#00695c' },
    { key:'tpm',         label:'Technical PM',         color:'#1a6b8a' },
    { key:'cpms',        label:'CPMS Lead',            color:'#4a5568' },
    { key:'engineering', label:'Engineering Support',  color:'#3a7a52' },
    { key:'procurement', label:'Procurement',          color:'#b36a00' },
    { key:'quality',     label:'Quality',              color:'#2e7d32' },
    { key:'hse',         label:'HSE',                  color:'#c0392b' },
    { key:'management',  label:'Management',           color:'#1a1916' },
    { key:'other',       label:'Other',                color:'#6b6860' },
  ];

  const COMPANIES = [
    { key:'ourco', label:'Our Company', color:'#009999' },
    { key:'client',  label:'Client',         color:'#c0392b' },
    { key:'sub',     label:'Subcontractor',  color:'#b36a00' },
    { key:'partner', label:'Partner',        color:'#7b4fa6' },
    { key:'other',   label:'Other',          color:'#6b6860' },
  ];

  let personCount   = 0;
  let currentFormat = 'A4';
  let compactMode   = false;

  // Node dimensions
  const NODE_W    = () => compactMode ? 144 : 156;
  const NODE_H    = () => compactMode ? 62  : 74;
  const H_GAP     = () => compactMode ? 18  : 22;
  const V_GAP     = () => compactMode ? 36  : 46;

  function setFormat(fmt) {
    currentFormat = fmt;
    document.querySelectorAll('.tb-btn[data-fmt]').forEach(b => b.classList.toggle('active', b.dataset.fmt === fmt));
    const sizes = { A4:'A4 landscape', A3:'A3 landscape', screen:null };
    document.getElementById('page-size-style').textContent =
      sizes[fmt] ? `@page { size:${sizes[fmt]}; margin:10mm; }` : '';
  }

  function toggleCompact() {
    compactMode = !compactMode;
    document.getElementById('compact-btn').classList.toggle('active', compactMode);
  }

  // ── Role / Company helpers ──
  function roleLabel(key)   { return ROLES.find(r=>r.key===key)?.label    || key; }
  function roleColor(key)   { return ROLES.find(r=>r.key===key)?.color    || '#6b6860'; }
  function compLabel(key)   { return COMPANIES.find(c=>c.key===key)?.label || key; }
  function compColor(key)   { return COMPANIES.find(c=>c.key===key)?.color || '#6b6860'; }

  // ── Role opts / company opts HTML ──
  function roleOpts(sel) {
    return ROLES.map(r=>`<option value="${r.key}"${r.key===sel?' selected':''}>${r.label}</option>`).join('');
  }
  function compOpts(sel) {
    return COMPANIES.map(c=>`<option value="${c.key}"${c.key===sel?' selected':''}>${c.label}</option>`).join('');
  }

  // ── Add person row ──
  function addPerson(data) {
    const tbody   = document.getElementById('people-body');
    const id      = personCount++;
    const isVac   = !!data.vacancy;
    const defRole = data.role    || (isVac ? 'other' : 'pm');
    const defCo = data.company || 'ourco';
    const defClr  = data.color   || roleColor(defRole);

    const tr = document.createElement('tr');
    tr.className   = 'node-row' + (isVac ? ' vacancy-row' : '');
    tr.dataset.id  = id;
    tr.dataset.vac = isVac ? '1' : '0';
    tr.draggable   = true;
    initDrag(tr);

    tr.innerHTML = `
      <td><span class="drag-handle">⠿</span></td>
      <td>${isVac ? '<span class="vacancy-badge-editor">Vacancy</span>' : '<span style="font-size:10px;color:var(--faint);">Person</span>'}</td>
      <td><input class="p-name" type="text" value="${data.name||''}" placeholder="${isVac?'Role to fill':'Full name'}"></td>
      <td><input class="p-title" type="text" value="${data.title||''}" placeholder="e.g. Project Manager"></td>
      <td><select class="p-role">${roleOpts(defRole)}</select></td>
      <td><select class="p-company">${compOpts(defCo)}</select></td>
      <td><select class="p-parent" style="font-size:11px;"><option value="">— None (top level) —</option></select></td>
      <td>
        <div class="color-wrap">
          <input class="p-color" type="color" value="${defClr}">
          <span class="chex">${defClr}</span>
        </div>
      </td>
      <td><button class="btn-del" onclick="this.closest('tr').remove()">×</button></td>
    `;

    tr.querySelector('.p-color').addEventListener('input', function() {
      this.nextElementSibling.textContent = this.value;
    });
    tr.querySelector('.p-role').addEventListener('change', function() {
      const colorInp = tr.querySelector('.p-color');
      colorInp.value = roleColor(this.value);
      colorInp.nextElementSibling.textContent = colorInp.value;
      refreshParentDropdowns();
    });
    tr.querySelector('.p-title').addEventListener('input', refreshParentDropdowns);
    tbody.appendChild(tr);
    // Store the intended parent id for restoration after refresh
    if (data.parent !== undefined) tr.dataset.pendingParent = data.parent;
    if (data._savedParent !== undefined) tr.dataset.savedParent = data._savedParent;
    refreshParentDropdowns();
  }

  function refreshParentDropdowns() {
    // Build list of all current nodes: {id, label}
    const rows = [...document.querySelectorAll('#people-body tr.node-row')];
    const opts = rows.map(r => {
      const id    = r.dataset.id;
      const role  = r.querySelector('.p-role')?.value || 'other';
      const title = r.querySelector('.p-title')?.value.trim() || '';
      const label = roleLabel(role) + (title ? ' — ' + title : '');
      return { id, label };
    });

    rows.forEach(r => {
      const sel     = r.querySelector('.p-parent');
      const current = sel.value || r.dataset.pendingParent || '';
      sel.innerHTML = '<option value="">— None (top level) —</option>';
      opts.forEach(o => {
        if (o.id === r.dataset.id) return; // can't report to self
        const opt = document.createElement('option');
        opt.value = o.id;
        opt.textContent = o.label;
        if (o.id === current) opt.selected = true;
        sel.appendChild(opt);
      });
      // Consume pending parent after first match
      if (r.dataset.pendingParent !== undefined) {
        delete r.dataset.pendingParent;
      }
    });
  }

  function getPeople() {
    const allRows = [...document.querySelectorAll('#people-body tr.node-row')];
    // Filter first so positional indices are stable
    const rows = allRows.filter(tr =>
      tr.querySelector('.p-name').value.trim() || tr.dataset.vac === '1'
    );
    // Map internal DOM id → positional index so parent refs survive reload
    const idToPos = {};
    rows.forEach((r, i) => { idToPos[r.dataset.id] = String(i); });

    return rows.map(tr => ({
      id:      tr.dataset.id,
      vacancy: tr.dataset.vac === '1',
      name:    tr.querySelector('.p-name').value.trim(),
      title:   tr.querySelector('.p-title').value.trim(),
      role:    tr.querySelector('.p-role').value,
      company: tr.querySelector('.p-company').value,
      parent:  idToPos[tr.querySelector('.p-parent').value.trim()] ?? '',
      color:   tr.querySelector('.p-color').value,
    }));
  }

  // ── Drag ──
  let dragSrc = null;
  function initDrag(tr) {
    tr.addEventListener('dragstart', e => { dragSrc=tr; tr.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    tr.addEventListener('dragend',   () => { dragSrc=null; document.querySelectorAll('.node-row').forEach(r=>r.classList.remove('dragging','drag-over')); });
    tr.addEventListener('dragover',  e => { e.preventDefault(); if(dragSrc&&dragSrc!==tr){ document.querySelectorAll('.node-row').forEach(r=>r.classList.remove('drag-over')); tr.classList.add('drag-over'); } });
    tr.addEventListener('drop', e => { e.preventDefault(); if(!dragSrc||dragSrc===tr) return; tr.parentNode.insertBefore(dragSrc,tr); tr.classList.remove('drag-over'); });
  }

  // ── Tree layout ──
  function buildTree(people) {
    const byId = {};
    people.forEach(p => { p.children=[]; p._parent=null; byId[p.id]=p; });
    people.forEach(p => {
      if (p.parent) {
        const par = byId[p.parent];
        if (par) { par.children.push(p); p._parent=par; }
      }
    });
    return people.filter(p => !p._parent);
  }

  // Compute subtree width needed (in node units)
  function subtreeWidth(node) {
    if (!node.children.length) return 1;
    return node.children.reduce((s,c) => s + subtreeWidth(c), 0);
  }

  // Assign x,y positions recursively
  function layoutNode(node, depth, leftOffset, positions) {
    const sw  = subtreeWidth(node);
    const nw  = NODE_W(), hg = H_GAP(), vg = V_GAP(), nh = NODE_H();
    const x   = leftOffset * (nw + hg) + (sw - 1) * (nw + hg) / 2;
    const y   = depth * (nh + vg);
    positions[node.id] = { x, y, w:nw, h:nh };

    let childLeft = leftOffset;
    node.children.forEach(child => {
      layoutNode(child, depth + 1, childLeft, positions);
      childLeft += subtreeWidth(child);
    });
  }

  // ── Render chart ──
  function renderChart(roots, people) {
    const canvas = document.getElementById('org-canvas');
    canvas.innerHTML = '';

    if (!people.length) {
      canvas.innerHTML = '<div style="padding:40px;text-align:center;color:#aaa;font-size:13px;">No team members added.</div>';
      return;
    }

    // Layout
    const positions = {};
    let leftOffset = 0;
    roots.forEach(r => {
      layoutNode(r, 0, leftOffset, positions);
      leftOffset += subtreeWidth(r);
    });

    // Canvas size
    const nw = NODE_W(), nh = NODE_H(), hg = H_GAP(), vg = V_GAP();
    const totalW = leftOffset * (nw + hg) - hg + 40;
    const maxDepth = people.reduce((m,p) => {
      let d=0, cur=p; while(cur._parent){d++;cur=cur._parent;} return Math.max(m,d);
    }, 0);
    const totalH = (maxDepth + 1) * (nh + vg) - vg + 20;

    canvas.style.width  = totalW + 'px';
    canvas.style.height = totalH + 'px';

    // SVG for connector lines
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','connectors');
    svg.setAttribute('width',  totalW);
    svg.setAttribute('height', totalH);
    svg.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';

    function line(x1,y1,x2,y2) {
      const l = document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1);
      l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke','#ccc9c1'); l.setAttribute('stroke-width','2');
      svg.appendChild(l);
    }

    canvas.appendChild(svg);

    // Draw nodes
    people.forEach(p => {
      const pos = positions[p.id];
      if (!pos) return;

      const div = document.createElement('div');
      div.className = 'org-node' + (compactMode?' compact':'') + (p.vacancy?' vacancy':'');
      div.style.left = (pos.x + 20) + 'px';
      div.style.top  = (pos.y + 10) + 'px';
      div.style.width = pos.w + 'px';

      const coBg  = compColor(p.company) + '22';
      const coClr = compColor(p.company);

      if (p.vacancy) {
        div.innerHTML = `
          <div class="node-top" style="background:${p.color};opacity:0.4;"></div>
          <div class="node-body">
            <div class="node-role-tag" style="color:${p.color}">${roleLabel(p.role)}</div>
            <div class="node-name vacancy-name">${p.name || 'Vacancy'}</div>
            ${p.title ? `<div class="node-title-txt">${p.title}</div>` : ''}
            <span class="vacancy-label">Open Position</span>
          </div>`;
      } else {
        div.innerHTML = `
          <div class="node-top" style="background:${p.color}"></div>
          <div class="node-body">
            <div class="node-role-tag" style="color:${p.color}">${roleLabel(p.role)}</div>
            <div class="node-name">${p.name}</div>
            ${p.title ? `<div class="node-title-txt">${p.title}</div>` : ''}
            <span class="node-company-tag" style="background:${coBg};color:${coClr}">${compLabel(p.company)}</span>
          </div>`;
      }
      canvas.appendChild(div);
    });

    // Draw orthogonal connectors — grouped per parent (bus-bar style).
    // Each parent gets: one vertical stub → one horizontal bus → per-child drops.
    // This avoids overlapping lines when a parent has multiple children.
    people.forEach(parent => {
      if (!parent.children.length) return;
      const pp = positions[parent.id];
      if (!pp) return;

      const px   = pp.x + 20 + pp.w / 2;  // parent center-x
      const py   = pp.y + 10 + pp.h;       // parent bottom-y
      const busY = py + vg / 2;             // horizontal bus level

      const valid = parent.children
        .map(c => ({ c, cp: positions[c.id] }))
        .filter(({ cp }) => !!cp);
      if (!valid.length) return;

      const xs   = valid.map(({ cp }) => cp.x + 20 + cp.w / 2);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);

      // 1. Vertical stub: parent bottom → bus level
      line(px, py, px, busY);

      // 2. Horizontal bus spanning all child columns
      //    Extend to px as well so the stub always meets the bus
      line(Math.min(px, minX), busY, Math.max(px, maxX), busY);

      // 3. Per-child vertical drop: bus → child top
      valid.forEach(({ cp }) => {
        const cx = cp.x + 20 + cp.w / 2;
        const cy = cp.y + 10;
        line(cx, busY, cx, cy);
      });
    });

    // Auto-scale for print
    autoScale(totalW);
  }

  function autoScale(contentW) {
    const wrap = document.getElementById('org-scale-wrap');
    const printW = currentFormat === 'A3' ? 400 : 277; // mm approx usable
    const pxPerMm = 3.78;
    const maxPx = printW * pxPerMm;
    const scale = contentW > maxPx ? maxPx / contentW : 1;
    wrap.style.transform = scale < 1 ? `scale(${scale.toFixed(3)})` : '';
    wrap.style.transformOrigin = 'top center';
    const canvas = document.getElementById('org-canvas');
    if (scale < 1) {
      const scaledH = parseInt(canvas.style.height) * scale;
      wrap.style.height = scaledH + 'px';
    } else {
      wrap.style.height = '';
    }
  }

  // ── Generate ──
  function generate() {
    const title  = document.getElementById('chart-title').value.trim();
    const rev    = document.getElementById('chart-rev').value.trim();
    const date   = document.getElementById('chart-date').value.trim();
    const people = getPeople();
    const roots  = buildTree(people);

    document.getElementById('out-title').textContent = title;
    document.getElementById('out-sub').textContent   = '';
    document.getElementById('out-meta').innerHTML    = `${rev}${date?'<br>'+date:''}`;

    renderChart(roots, people);

    // Legend
    const legend = document.getElementById('out-legend');
    legend.innerHTML = '';
    const seenColors = new Map();
    let hasVacancy = false;
    people.forEach(p => {
      if (p.vacancy) { hasVacancy=true; return; }
      if (!seenColors.has(p.color)) seenColors.set(p.color, roleLabel(p.role));
    });
    seenColors.forEach((lbl, clr) => {
      legend.innerHTML += `<div class="out-li"><div class="out-ld" style="background:${clr}"></div>${lbl}</div>`;
    });
    if (hasVacancy) {
      legend.innerHTML += `<div class="out-li"><div class="vacancy-legend-icon"></div>Open Position</div>`;
    }

    document.getElementById('editor').style.display = 'none';
    document.getElementById('output').style.display  = 'block';
    window.scrollTo(0,0);
  }

  function goBack() {
    document.getElementById('output').style.display = 'none';
    document.getElementById('editor').style.display = 'block';
  }

  // ── Save / Load / Export ──
  function collectState() {
    return {
      version: '1.2', format: currentFormat, compact: compactMode,
      title:   document.getElementById('chart-title').value,
      projNum: document.getElementById('proj-num').value,
      rev:     document.getElementById('chart-rev').value,
      date:    document.getElementById('chart-date').value,
      people: getPeople(),
    };
  }

  function _suiteBundle(ownState) {
    const suite = { _suite:true, _version:1, _savedAt:new Date().toISOString(), _savedFrom:'orgcast' };
    ['timecast','resourcecast','orgcast','rfqcast','dorcast','calccast','riskcast'].forEach(k => {
      const raw = localStorage.getItem('bidcast_state_' + k);
      suite[k] = raw ? JSON.parse(raw) : null;
    });
    suite.orgcast = ownState;
    return suite;
  }

  function saveJSON() {
    const state = collectState();
    localStorage.setItem('bidcast_state_orgcast', JSON.stringify(state));
    const name  = (state.title||'orgchart').replace(/[^a-z0-9_-]/gi,'_').toLowerCase();
    const blob  = new Blob([JSON.stringify(_suiteBundle(state),null,2)], {type:'application/json'});
    const a     = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = name+'_suite.json'; a.click();
    URL.revokeObjectURL(a.href);
    const c = document.getElementById('save-confirm');
    c.style.display='inline'; setTimeout(()=>c.style.display='none',2000);
    _writeBackup();
}

  function loadJSON(input) {
    const file=input.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
      try {
        const data = JSON.parse(e.target.result);
        if (data._suite) {
          ['timecast','resourcecast','orgcast','rfqcast','dorcast','calccast','riskcast'].forEach(k => {
            if (k !== 'orgcast' && data[k]) localStorage.setItem('bidcast_state_' + k, JSON.stringify(data[k]));
          });
          if (data.orgcast) applyState(data.orgcast);
          else alert('No OrgCast data found in this suite file.');
        } else { applyState(data); }
      } catch(err) { alert('Invalid .json file.'); }
    };
    reader.readAsText(file); input.value='';
  }

  function applyState(s) {
    document.getElementById('chart-title').value = s.title||'';
    document.getElementById('proj-num').value    = s.projNum||'';
    document.getElementById('chart-rev').value   = s.rev  ||'';
    document.getElementById('chart-date').value  = s.date ||'';
    if (s.format) setFormat(s.format);
    if (s.compact !== undefined) { compactMode=s.compact; document.getElementById('compact-btn').classList.toggle('active',compactMode); }
    document.getElementById('people-body').innerHTML=''; personCount=0;
    // Add all without parents first
    (s.people||[]).forEach(p=>addPerson({...p, _savedParent: p.parent, parent: undefined}));
    // Restore parents after all rows exist
    const rows = [...document.querySelectorAll('#people-body tr.node-row')];
    rows.forEach(r => {
      const saved = r.dataset.savedParent;
      if (saved) {
        const sel = r.querySelector('.p-parent');
        if (sel) sel.value = saved;
        delete r.dataset.savedParent;
      }
    });
    refreshParentDropdowns();
  }

  function exportHTML() {
    const state   = collectState();
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
    const src     = document.documentElement.outerHTML;
    const inject  = ['<scr','ipt>','window.addEventListener("DOMContentLoaded",function(){var s=JSON.parse(decodeURIComponent(escape(atob("',encoded,'"))));applyState(s);});','</scr','ipt>'].join('');
    const out     = src.replace('</body>', inject+'\n</body>');
    const name    = (state.title||'orgchart').replace(/[^a-z0-9_-]/gi,'_').toLowerCase();
    const blob    = new Blob([out],{type:'text/html'});
    const a       = document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download=name+'_orgcast.html'; a.click();
    URL.revokeObjectURL(a.href);
  }

  function exportExcel() {
    const state  = collectState();
    const people = getPeople();
    const nameMap = {};
    people.forEach((p, i) => { nameMap[String(i)] = p.name || ('Vacancy ' + (i + 1)); });

    const rows = people.map((p, i) => ({
      '#':          i + 1,
      'Name':       p.vacancy ? '(Vacant)' : p.name,
      'Title':      p.title || '',
      'Role':       roleLabel(p.role),
      'Company':    compLabel(p.company),
      'Reports To': p.parent !== '' ? (nameMap[p.parent] || '') : '',
      'Vacancy':    p.vacancy ? 'Yes' : 'No',
    }));

    const wb  = XLSX.utils.book_new();
    const ws  = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [
      { wch: 4 }, { wch: 28 }, { wch: 32 }, { wch: 20 }, { wch: 20 }, { wch: 28 }, { wch: 8 }
    ];
    XLSX.utils.book_append_sheet(wb, ws, 'Organisation');

    const meta = XLSX.utils.aoa_to_sheet([
      ['Chart Title', state.title || ''],
      ['Date',        state.date  || ''],
      ['Format',      state.format || 'A4'],
    ]);
    XLSX.utils.book_append_sheet(wb, meta, 'Info');

    const name = (state.title || 'orgcast').replace(/[^a-z0-9_-]/gi, '_').toLowerCase();
    XLSX.writeFile(wb, name + '_orgcast.xlsx');
  }

  function setParentByRole(childRole, parentRole) {
    const rows = [...document.querySelectorAll('#people-body tr.node-row')];
    const parentRow = rows.find(r => r.querySelector('.p-role')?.value === parentRole);
    const childRow  = rows.find(r => r.querySelector('.p-role')?.value === childRole);
    if (!parentRow || !childRow) return;
    const sel = childRow.querySelector('.p-parent');
    if (sel) sel.value = parentRow.dataset.id;
  }

  // ── Print fix ──
  let _wasInOutput = false;
  window.addEventListener('beforeprint', function() {
    const output = document.getElementById('output');
    const editor = document.getElementById('editor');
    _wasInOutput = output.style.display !== 'none';
    editor.setAttribute('style', 'display:none !important');
    output.setAttribute('style', 'display:block !important');
  });
  window.addEventListener('afterprint', function() {
    const output = document.getElementById('output');
    const editor = document.getElementById('editor');
    if (!_wasInOutput) {
      output.setAttribute('style', 'display:none');
      editor.setAttribute('style', '');
    } else {
      output.setAttribute('style', 'display:block');
      editor.setAttribute('style', 'display:none');
    }
  });

  // ── Undo / Redo ──
  let _hist = [], _histIdx = -1, _suppHist = false, _histTimer = null, _lastSaved = null;

  function _snapshot() {
    if (_suppHist) return;
    const s = JSON.stringify(collectState());
    if (_hist[_histIdx] === s) return;
    _hist = _hist.slice(0, _histIdx + 1);
    _hist.push(s);
    if (_hist.length > 50) _hist.shift(); else _histIdx++;
    _syncUndoUI();
    localStorage.setItem('bidcast_state_orgcast', s);
  suiteWrite();
    _lastSaved = Date.now(); _updateSavedLabel();
  }
  function _scheduleSnap() {
    if (_suppHist) return;
    clearTimeout(_histTimer); _histTimer = setTimeout(_snapshot, 800);
  }
  function undo() {
    clearTimeout(_histTimer);
    if (_histIdx <= 0) return;
    _suppHist = true; _histIdx--;
    applyState(JSON.parse(_hist[_histIdx]));
    _suppHist = false; _syncUndoUI();
  }
  function redo() {
    clearTimeout(_histTimer);
    if (_histIdx >= _hist.length - 1) return;
    _suppHist = true; _histIdx++;
    applyState(JSON.parse(_hist[_histIdx]));
    _suppHist = false; _syncUndoUI();
  }
  function _syncUndoUI() {
    const u = document.getElementById('btn-undo'), r = document.getElementById('btn-redo');
    if (u) u.disabled = _histIdx <= 0;
    if (r) r.disabled = _histIdx >= _hist.length - 1;
  }
  function _updateSavedLabel() {
    const el = document.getElementById('autosave-label');
    if (!el) return;
    if (!_lastSaved) { el.textContent = ''; return; }
    const s = Math.floor((Date.now() - _lastSaved) / 1000);
    el.textContent = s < 5 ? '● Saved' : s < 60 ? '● Saved ' + s + 's ago' : '● Saved ' + Math.floor(s / 60) + 'm ago';
  }
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
      if (e.key === 's') { e.preventDefault(); saveJSON(); }
      if (e.key === 'e') { e.preventDefault(); exportPDF(); }
    }
  });
  (function() {
    const _rawApply = applyState;
    applyState = s => { _suppHist = true; _rawApply(s); _suppHist = false; };
    const ed = document.getElementById('editor');
    if (ed) {
      new MutationObserver(() => {
        if (_suppHist) return;
        clearTimeout(_histTimer); _histTimer = setTimeout(_snapshot, 400);
      }).observe(ed, { childList: true, subtree: true });
      ed.addEventListener('input', _scheduleSnap);
    }
    setTimeout(_snapshot, 300);
  })();

  // ── PDF Export ──
  function exportPDF() {
    const state = collectState();
    const name = (state.title || 'orgcast').replace(/[^a-z0-9_-]/gi, '_').toLowerCase();
    const fmt = (state.format || 'A4').toUpperCase();
    html2pdf().set({
      margin: 0, filename: name + '.pdf',
      image: { type: 'jpeg', quality: 0.97 },
      html2canvas: {
        scale: 2, useCORS: true,
        onclone: d => {
          d.querySelectorAll(
            '.no-print, .print-bar, .persist-bar, .suite-nav, .config-bar'
          ).forEach(el => el.remove());
          // Ensure org chart SVG fills the full page width
          const wrap = d.querySelector('#output');
          if (wrap) { wrap.style.width = '100%'; wrap.style.padding = '10mm 12mm'; }
        },
      },
      jsPDF: { unit: 'mm', format: fmt === 'A3' ? 'a3' : 'a4', orientation: 'landscape' }
    }).from(document.getElementById('output')).save();
  }

  // ── PNG Export ──
  function exportPNG() {
    const svg = document.querySelector('#output svg.connectors');
    const canvas = document.getElementById('org-canvas');
    if (!canvas) { alert('Please generate the chart first.'); return; }

    // Clone the output section to a temporary container for rendering
    const outputEl = document.getElementById('output');
    const clone = outputEl.cloneNode(true);
    clone.style.cssText = 'position:fixed;left:-9999px;top:0;background:#fff;padding:28px 36px;display:block;';
    // Remove print-bar from clone
    clone.querySelectorAll('.print-bar, .no-print').forEach(el => el.remove());
    document.body.appendChild(clone);

    const cloneCanvas = clone.querySelector('#org-canvas');
    const cloneSvg = clone.querySelector('svg.connectors');

    // Determine dimensions
    const w = cloneCanvas ? (parseInt(cloneCanvas.style.width) || 800) + 80 : 800;
    const h = cloneCanvas ? (parseInt(cloneCanvas.style.height) || 600) + 80 : 600;

    // Build a standalone SVG wrapping the full output as foreignObject
    // Use XMLSerializer to get the SVG connectors, then draw to canvas
    const svgConnectors = cloneSvg ? new XMLSerializer().serializeToString(cloneSvg) : '';

    // Fallback: use html2canvas-style approach via SVG foreignObject
    const fullSvg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}">
      <rect width="${w}" height="${h}" fill="#fff"/>
      <foreignObject width="${w}" height="${h}">
        <div xmlns="http://www.w3.org/1999/xhtml" style="width:${w}px;height:${h}px;overflow:hidden;">${clone.innerHTML}</div>
      </foreignObject>
    </svg>`;

    document.body.removeChild(clone);

    const blob = new Blob([fullSvg], { type: 'image/svg+xml;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      const cvs = document.createElement('canvas');
      cvs.width  = w * 2;
      cvs.height = h * 2;
      const ctx  = cvs.getContext('2d');
      ctx.scale(2, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      const a = document.createElement('a');
      a.download = 'orgcast-export.png';
      a.href = cvs.toDataURL('image/png');
      a.click();
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      alert('PNG export failed. Try the PDF export instead.');
    };
    img.src = url;
  }

/* ── SUITE SYNC ── */

/**
 * Write OrgCast data to the shared sync store.
 * Publishes: team (non-vacant people), projectName (from chart title).
 */
function suiteWrite() {
  try {
    const people = getPeople();
    const team   = people.filter(p => !p.vacancy && p.name).map(p => ({
      syncId:  'oc_' + p.id,
      name:    p.name, title: p.title,
      roleKey: p.role, company: p.company, color: p.color,
    }));
    const prev = SuiteManager.read();
    SuiteManager.write({
      team: team.length ? team : (prev.team || []),
    }, 'orgcast');
    SuiteManager.updateBadge(document.getElementById('suite-sync-badge'));
  } catch(e) {}
}

/**
 * React to sync updates from other tools.
 * - Adds team members from ResourceCast that aren't already present.
 * - Writes project name from sync (index page is source of truth).
 */
function suiteRead(sync) {
  try {
    if (!sync || sync._src === 'orgcast') {
      SuiteManager.updateBadge(document.getElementById('suite-sync-badge'));
      return;
    }
    // Add new team members received from ResourceCast (deduplication by title/name)
    if (sync.team && sync.team.length) {
      const existingTitles = new Set(getPeople().map(p => (p.title||'').trim().toLowerCase()));
      const existingNames  = new Set(getPeople().map(p => (p.name ||'').trim().toLowerCase()).filter(Boolean));
      sync.team.forEach(t => {
        const byTitle = t.title && existingTitles.has(t.title.trim().toLowerCase());
        const byName  = t.name  && existingNames.has(t.name.trim().toLowerCase());
        if (!byTitle && !byName) {
          addPerson({ name: t.name||'', title: t.title||'', role: t.roleKey||'other',
                      company: t.company||'ourco', color: t.color||'#6b6860' });
        }
      });
    }
    // Always apply project name from sync (index is source of truth).
    // Ignore the generic sentinel "Project Name" so it never overwrites a real value.
    const titleEl = document.getElementById('chart-title');
    if (titleEl && sync.projectName && sync.projectName !== 'Project Name' && document.activeElement !== titleEl)
      titleEl.value = sync.projectName;
    const pn = document.getElementById('proj-num');
    if (pn && sync.projNum && document.activeElement !== pn) pn.value = sync.projNum;
    SuiteManager.updateBadge(document.getElementById('suite-sync-badge'));
  } catch(e) {}
}

// Cross-tab listener — reacts to any tool updating the shared store or logo.
SuiteManager.onUpdate((sync, key) => {
  if (key === 'bidcast_logo' || key === 'bidcast_customer_logo') { updateLogoUI(); return; }
  suiteRead(sync);
});

document.addEventListener('DOMContentLoaded', () => {
  _applyTheme(localStorage.getItem('bidcast_theme') || 'light');
  updateLogoUI();
  const _saved = localStorage.getItem('bidcast_state_orgcast');
  if (_saved) { try { applyState(JSON.parse(_saved)); } catch(e) {} }
  _lastSaved = Date.now(); _updateSavedLabel();
  setInterval(_updateSavedLabel, 15000);
  suiteRead(SuiteManager.read());
  setTimeout(suiteWrite, 900);
});


/* ── Dark mode ── */
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('bidcast_theme', newTheme);
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = newTheme === 'dark' ? '☀' : '🌙';
  try {
    const sync = JSON.parse(localStorage.getItem('bidcast_suite_sync') || '{}');
    sync.theme = newTheme; sync._ts = Date.now();
    localStorage.setItem('bidcast_suite_sync', JSON.stringify(sync));
  } catch(e) {}
}
function _applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme || 'light');
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
}

function _writeBackup() {
  const toolKey = 'bidcast_state_orgcast';
  const stateStr = localStorage.getItem(toolKey);
  if (!stateStr) return;
  localStorage.setItem('bidcast_backup_orgcast_' + Date.now(), stateStr);
  // Prune: keep only last 5 backups for this tool
  const prefix = 'bidcast_backup_orgcast_';
  const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix)).sort();
  while (keys.length > 5) localStorage.removeItem(keys.shift());
}

function _showBackups() {
  const existing = document.getElementById('backup-popover');
  if (existing) { existing.remove(); return; }
  const prefix = 'bidcast_backup_orgcast_';
  const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix)).sort().reverse();
  const pop = document.createElement('div');
  pop.id = 'backup-popover';
  pop.style.cssText = 'position:absolute;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;min-width:220px;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);font-size:11px;';
  if (keys.length === 0) {
    pop.innerHTML = '<div style="color:var(--faint);padding:4px 6px;">No backups yet.</div>';
  } else {
    keys.forEach(k => {
      const ts = parseInt(k.replace(prefix, ''));
      const d = new Date(ts);
      const ago = _relTime(ts);
      const item = document.createElement('div');
      item.style.cssText = 'padding:5px 8px;cursor:pointer;border-radius:4px;';
      item.textContent = ago + ' — ' + d.toLocaleTimeString();
      item.onmouseover = () => item.style.background = 'var(--bg)';
      item.onmouseout  = () => item.style.background = '';
      item.onclick = () => {
        if (!confirm('Restore this backup? Current state will be replaced.')) return;
        try { applyState(JSON.parse(localStorage.getItem(k))); pop.remove(); } catch(e) { alert('Could not restore backup.'); }
      };
      pop.appendChild(item);
    });
  }
  // Position near the backup button
  const btn = document.getElementById('backup-btn');
  if (btn) {
    const rect = btn.getBoundingClientRect();
    pop.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    pop.style.right = (window.innerWidth - rect.right) + 'px';
    pop.style.left = 'auto';
  }
  document.body.appendChild(pop);
  setTimeout(() => document.addEventListener('click', function _cl(e) {
    if (!pop.contains(e.target) && e.target.id !== 'backup-btn') { pop.remove(); document.removeEventListener('click', _cl); }
  }), 50);
}

function _relTime(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)  return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
