<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYL0N — Sign In</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f4f0;
  color: #1a1916;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-app-region: drag;
  user-select: none;
}

.card {
  background: #fff;
  border: 1px solid #e0ddd6;
  border-radius: 16px;
  padding: 48px 40px 40px;
  width: 360px;
  text-align: center;
  -webkit-app-region: no-drag;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  background: #1e3a5f;
  border-radius: 16px;
  margin-bottom: 24px;
}

.logo svg { width: 36px; height: 36px; }

h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
  color: #1a1916;
}

.subtitle {
  font-size: 13px;
  color: #6b6860;
  margin-bottom: 32px;
  line-height: 1.5;
}

.btn-azure {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 20px;
  background: #0078d4;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-azure:hover  { background: #106ebe; }
.btn-azure:active { background: #005a9e; }
.btn-azure:disabled { background: #a8c6e8; cursor: not-allowed; }

.btn-azure svg { flex-shrink: 0; }

.status {
  margin-top: 20px;
  font-size: 13px;
  color: #6b6860;
  min-height: 20px;
}

.status.error { color: #c0392b; }

.footer {
  margin-top: 32px;
  font-size: 11px;
  color: #aaa9a4;
  border-top: 1px solid #f0ede8;
  padding-top: 20px;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2"  y="2"  width="12" height="12" rx="3" fill="white"/>
      <rect x="18" y="2"  width="12" height="12" rx="3" fill="white"/>
      <rect x="2"  y="18" width="12" height="12" rx="3" fill="white"/>
      <rect x="18" y="18" width="12" height="12" rx="3" fill="white" opacity="0.4"/>
    </svg>
  </div>

  <h1>Welcome to PYL0N</h1>
  <p class="subtitle">Sign in with your company account<br>to access the suite.</p>

  <button class="btn-azure" id="sign-in-btn" onclick="signIn()">
    <!-- Microsoft logo mark -->
    <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
      <rect x="1"  y="1"  width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1"  width="9" height="9" fill="#7fba00"/>
      <rect x="1"  y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Sign in with Microsoft
  </button>

  <div class="status" id="status"></div>

  <div class="footer">
    Access is managed by your IT department.<br>
    Contact IT if you cannot sign in.
  </div>
</div>

<script>
const btn    = document.getElementById('sign-in-btn');
const status = document.getElementById('status');

function setStatus(msg, isError = false) {
  status.textContent = msg;
  status.className   = 'status' + (isError ? ' error' : '');
}

async function signIn() {
  btn.disabled = true;
  setStatus('Opening Microsoft sign-in…');

  try {
    const user = await window.electronAPI.login();
    setStatus(`Signed in as ${user.name}. Loading…`);
    // Small delay so user sees the confirmation, then main process loads index.html
    setTimeout(() => window.electronAPI.authSuccess(), 800);
  } catch (err) {
    setStatus(err.message || 'Sign-in failed. Please try again.', true);
    btn.disabled = false;
  }
}
</script>

</body>
</html>
