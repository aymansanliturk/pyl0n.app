<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYL0N — Access Denied</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f5f4f0;
  color: #1a1916;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border: 1px solid #e0ddd6;
  border-radius: 16px;
  padding: 48px 40px;
  width: 380px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}
.icon { font-size: 40px; margin-bottom: 20px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
p  { font-size: 14px; color: #6b6860; line-height: 1.6; margin-bottom: 24px; }
a  {
  display: inline-block;
  padding: 10px 24px;
  background: #2c4e87;
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
}
a:hover { background: #1e3a5f; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <h1>Access Denied</h1>
  <p>Your account doesn't have permission to access PYL0N.<br>
  Please contact your IT department to request access.</p>
  <a href="/.auth/logout">Sign out</a>
</div>
</body>
</html>
