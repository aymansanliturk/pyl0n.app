name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'       # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to create GitHub Releases

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG (x64 + arm64)
        run: npm run build:mac   # runs obfuscate automatically via prebuild:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows NSIS installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-dist
          path: dist/*.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/*.AppImage
          retention-days: 5

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: PYL0N ${{ steps.version.outputs.VERSION }}
          body: |
            ## PYL0N ${{ steps.version.outputs.VERSION }}

            ### Download

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows  | `PYL0N Setup *.exe` | Run installer, then launch from Start Menu |
            | macOS    | `PYL0N-*.dmg` | Open DMG, drag PYL0N to Applications |
            | Linux    | `PYL0N-*.AppImage` | `chmod +x` then run directly |

            ### What's new
            See commit history for changes in this release.
          files: |
            dist-all/mac-dist/*.dmg
            dist-all/mac-dist/*.zip
            dist-all/win-dist/*.exe
            dist-all/linux-dist/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
