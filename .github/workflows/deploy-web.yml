name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - master          # deploy automatically on every push to master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
  workflow_dispatch:    # allow manual deploy from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy web app
    # Skip the actual deploy step on closed PRs (but still run the job)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && 'close' || 'upload' }}
          app_location: "/"          # source files are in the repo root
          output_location: ""        # no build step — HTML files are the output
          skip_app_build: true       # do not run npm install / npm build
