<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DORCAST — Division of Responsibilities</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style id="page-size-style">@page { size: A3 landscape; margin: 8mm; }</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #fff; --border: #e0ddd6;
  --text: #1a1916; --muted: #6b6860; --faint: #a8a49e;
  --accent: #2c4e87; --accent2: #1e3a6b; --brand: #2c4e87; --green: #107c41; --red: #c0392b;
  --mark-x:    #2c4e87;
  --mark-na:   #a8a49e;
  --mark-text: #3a7a52;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* ── SUITE NAV ── */
.suite-nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 32px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.suite-home { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); }
.suite-logo-icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.suite-logo-icon svg { width:16px; height:16px; }
.suite-wordmark { font-size:14px; font-weight:700; letter-spacing:0.5px; }
.suite-sep { color:var(--border); font-size:20px; font-weight:300; margin:0 4px; }
.suite-tool-name { font-size:14px; font-weight:600; color:var(--accent); }
.suite-nav-right { display:flex; align-items:center; gap:8px; }
.logo-status { font-size:10px; font-weight:600; color:var(--green); }

/* ── EDITOR ── */
#editor { max-width:1100px; margin:0 auto; padding:24px 28px 60px; }


.section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:14px; }
.section-title { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--faint); margin-bottom:14px; }
.fields { display:grid; gap:12px; }
.f2 { grid-template-columns:1fr 1fr; }
.f3 { grid-template-columns:1fr 1fr 1fr; }
label { display:flex; flex-direction:column; gap:5px; font-size:11px; font-weight:500; color:var(--muted); }
input[type="text"], select { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); background:#faf9f7; border:1px solid var(--border); border-radius:8px; padding:10px 12px; outline:none; transition:border-color 0.15s; }
input:focus, select:focus { border-color:var(--accent); background:#fff; }

/* Config bar */
.config-bar { display:flex; align-items:center; gap:10px; margin-bottom:14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 18px; flex-wrap:wrap; }
.format-btn { padding:6px 14px; border-radius:20px; border:1.5px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.15s; }
.format-btn:hover { border-color:var(--accent); color:var(--accent); }
.format-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
.format-sep { width:1px; height:24px; background:var(--border); margin:0 4px; }

/* Persist bar */
.persist-bar { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.pb-btn { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); }
.pb-btn:hover { border-color:var(--accent); color:var(--accent); background:#f0f4fa; }
.pb-btn.dash-btn { border-color:var(--accent); color:var(--accent); }
.pb-btn.dash-btn:hover { background:var(--accent); color:#fff; }
.pb-btn.export { background:var(--accent); color:#fff; border-color:var(--accent); }
.pb-btn.export:hover { background:var(--accent2); }
.pb-btn.xl { background:#217346; color:#fff; border-color:#1a5c38; }
.pb-btn.xl:hover { background:#1a5c38; }
.pb-sep { width:1px; height:28px; background:var(--border); }
.pb-label { font-size:10px; color:var(--faint); font-weight:500; letter-spacing:0.5px; text-transform:uppercase; }
.save-confirm { font-size:10px; color:var(--green); display:none; font-weight:600; }

/* Parties editor */
.parties-wrap { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
.party-chip { display:flex; align-items:center; gap:6px; background:#faf9f7; border:1px solid var(--border); border-radius:6px; padding:6px 10px; }
.party-chip input[type="text"] { border:none; background:none; padding:2px 4px; font-size:12px; width:130px; }
.party-chip input[type="color"] { width:22px; height:22px; border:1px solid var(--border); border-radius:3px; padding:1px; cursor:pointer; }
.party-chip .del-party { background:none; border:none; cursor:pointer; color:#ccc; font-size:14px; padding:0 2px; }
.party-chip .del-party:hover { color:#e05555; }
.btn-add-party { background:none; border:1.5px dashed var(--border); border-radius:6px; padding:6px 12px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--muted); cursor:pointer; transition:all 0.15s; }
.btn-add-party:hover { border-color:var(--accent); color:var(--accent); }

/* DoR Table */
.dor-table-wrap { overflow-x:auto; margin-bottom:12px; }
.dor-table { width:100%; border-collapse:collapse; font-size:12px; }
.dor-table th { font-size:9px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--faint); padding:6px 8px; text-align:center; border-bottom:2px solid var(--border); white-space:nowrap; background:var(--surface); position:sticky; top:0; z-index:2; }
.dor-table th.th-label { text-align:left; min-width:280px; }
.dor-table th.th-num { min-width:52px; }
.dor-table th.th-comment { min-width:160px; text-align:left; }

.dor-row td { padding:3px 6px; border-bottom:1px solid #f0ede8; vertical-align:middle; }
.dor-row.row-section td { background:#f0f3f9; font-weight:700; font-size:11px; color:var(--accent); padding:6px 8px; }
.dor-row.row-subsection td { background:#faf9f7; font-weight:600; font-size:11px; color:var(--muted); padding:5px 8px; padding-left:16px; }
.dor-row.row-item td { }

.dor-row .drag-handle { cursor:grab; color:#ccc; font-size:13px; user-select:none; }
.dor-row.dragging { opacity:0.3; }
.dor-row.drag-over { border-top:2px solid var(--accent); }

.row-type-sel { font-size:10px; padding:2px 4px; border:1px solid var(--border); border-radius:3px; background:#faf9f7; color:var(--muted); }
.row-num-inp { width:52px; font-size:11px; padding:3px 5px; }
.row-label-inp { width:100%; font-size:12px; padding:3px 6px; }
.row-comment-inp { width:100%; font-size:11px; padding:3px 6px; }

/* Marker cell */
.mark-cell { text-align:center; min-width:44px; }
.mark-btn { display:inline-flex; align-items:center; justify-content:center;
  width:32px; height:22px; border-radius:4px; border:1.5px solid transparent;
  font-size:10px; font-weight:700; cursor:pointer; font-family:'DM Mono',monospace;
  transition:all 0.12s; user-select:none; }
.mark-btn[data-val="X"]    { background:#dde8f7; color:var(--mark-x);    border-color:#b8cef0; }
.mark-btn[data-val="n.a."] { background:#f0ede8; color:var(--mark-na);   border-color:#d8d5cf; font-size:8px; }
.mark-btn[data-val=""]     { background:#f5f4f0; color:#ccc;             border-color:#e8e5e0; }
.mark-btn:not([data-val=""]):not([data-val="X"]):not([data-val="n.a."]) {
  background:#edf7f0; color:var(--mark-text); border-color:#b8dfc5; }
.mark-btn:hover { transform:scale(1.1); }
/* Frequency summary cell */
.freq-cell { text-align:center; min-width:36px; font-family:'DM Mono',monospace; font-size:10px; color:var(--accent); font-weight:700; }
.freq-cell.zero { color:var(--faint); font-weight:400; }
.out-freq { text-align:center; font-family:'DM Mono',monospace; font-size:9px; font-weight:700; color:var(--accent); }
.out-freq.zero { color:var(--faint); font-weight:400; }

.btn-del-row { background:none; border:1px solid var(--border); border-radius:3px; width:20px; height:20px; cursor:pointer; color:#ccc; font-size:11px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
.btn-del-row:hover { border-color:#e05555; color:#e05555; background:#fff5f5; }

/* Insert-between row */
.insert-row { display:none; }
.insert-row td { padding:0; border:none; height:6px; position:relative; }
.insert-trigger {
  position:absolute; left:8px; top:50%; transform:translateY(-50%);
  display:flex; align-items:center; gap:2px;
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:20px; padding:2px 8px; box-shadow:0 2px 8px rgba(0,0,0,0.08);
  z-index:10; white-space:nowrap; opacity:0; pointer-events:none;
  transition:opacity 0.15s;
}
.dor-table tbody:hover .insert-row { display:table-row; }
.insert-row:hover .insert-trigger,
.dor-row:hover + .insert-row .insert-trigger { opacity:1; pointer-events:auto; }
.ins-btn { background:none; border:none; cursor:pointer; font-size:10px; font-weight:600;
  padding:2px 6px; border-radius:12px; transition:all 0.12s; font-family:'DM Sans',sans-serif; }
.ins-btn.ins-s { color:#2c4e87; } .ins-btn.ins-s:hover { background:#eef2fb; }
.ins-btn.ins-ss { color:var(--muted); } .ins-btn.ins-ss:hover { background:#f5f4f0; }
.ins-btn.ins-i { color:#3a7a52; } .ins-btn.ins-i:hover { background:#edf7f0; }
.ins-sep { color:#e0ddd6; font-size:10px; }

.add-row-bar { display:flex; gap:8px; margin-top:10px; }
.btn-add-row { flex:1; background:none; border:1.5px dashed var(--border); border-radius:6px; padding:7px 10px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.15s; }
.btn-add-row:hover { border-color:var(--accent); color:var(--accent); background:#f0f4fa; }

/* Preset modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); display:none; z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:12px; padding:28px 32px; max-width:440px; width:100%; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
.modal h3 { font-size:16px; font-weight:700; margin-bottom:8px; }
.modal p  { font-size:12px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
.modal-btns { display:flex; flex-direction:column; gap:10px; }
.modal-btn { padding:12px 16px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; text-align:left; transition:all 0.15s; }
.modal-btn:hover { border-color:var(--accent); background:#f0f4fa; color:var(--accent); }
.modal-btn .modal-btn-sub { font-size:10px; color:var(--faint); font-weight:400; margin-top:2px; }
.modal-close { float:right; background:none; border:none; font-size:18px; cursor:pointer; color:var(--faint); margin-top:-4px; }

.actions { display:flex; gap:12px; margin-top:8px; }
.btn-generate { flex:1; background:var(--accent); color:#fff; border:none; border-radius:7px; padding:13px 24px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.15s; }
.btn-generate:hover { background:var(--accent2); }
.btn-secondary { background:var(--surface); color:var(--muted); border:1px solid var(--border); border-radius:7px; padding:12px 18px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; }
.btn-secondary:hover { border-color:var(--text); color:var(--text); }
.btn-primary { font-family:'DM Sans',sans-serif; background:var(--accent); color:#fff; border:none; border-radius:7px; padding:9px 20px; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; }
.btn-primary:hover { background:var(--accent2); }
.btn-green   { font-family:'DM Sans',sans-serif; background:var(--green); color:#fff; border:none; border-radius:7px; padding:9px 20px; font-size:13px; font-weight:600; cursor:pointer; transition:filter 0.15s; }
.btn-green:hover { filter:brightness(0.9); }

/* ── OUTPUT ── */
#output { display:none; padding:24px 32px; }
.print-bar { display:flex; gap:10px; margin-bottom:18px; align-items:center; }

.out-header { display:flex; align-items:center; border-bottom:2px solid var(--text); padding-bottom:10px; margin-bottom:18px; gap:16px; }
.out-logo { flex-shrink:0; height:36px; }
.out-logo img { height:36px; width:auto; }
.out-title-block { flex:1; }
.out-title-block h1 { font-size:16px; font-weight:600; }
.out-title-block .sub { font-size:10px; color:var(--muted); margin-top:2px; }
.out-meta { font-family:'DM Mono',monospace; font-size:9px; color:var(--faint); line-height:1.8; text-align:right; }

/* Output table */
.out-table-wrap { overflow-x:auto; }
.out-table { width:100%; border-collapse:collapse; font-size:10px; }
.out-table th { font-size:8px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--faint); padding:5px 6px; text-align:center; border-bottom:2px solid var(--border); white-space:nowrap; background:#fff; }
.out-table th.th-label { text-align:left; }
.out-table th.th-comment { text-align:left; }
.out-table td { padding:3px 6px; border-bottom:1px solid #f0ede8; vertical-align:middle; }
.out-row-section td  { background:#f0f3f9; font-weight:700; font-size:10px; color:var(--accent); padding:5px 6px; }
.out-row-sub td      { background:#faf9f7; font-weight:600; font-size:9.5px; color:var(--muted); padding:4px 6px 4px 14px; }
.out-row-item td     { font-size:9.5px; }
.out-num { color:var(--faint); font-family:'DM Mono',monospace; font-size:8.5px; white-space:nowrap; }
.out-mark { text-align:center; }
.out-mark-x    { font-weight:700; color:var(--mark-x);  font-family:'DM Mono',monospace; }
.out-mark-na   { color:var(--mark-na); font-family:'DM Mono',monospace; font-size:8px; }
.out-mark-text { color:var(--mark-text); font-family:'DM Mono',monospace; font-size:8.5px; }
.out-comment   { font-size:8.5px; color:var(--muted); }

.out-legend { margin-top:14px; display:flex; flex-wrap:wrap; gap:6px 20px; }
.out-li { display:flex; align-items:center; gap:5px; font-size:9px; color:var(--muted); }
.out-ld { width:20px; height:14px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; font-family:'DM Mono',monospace; }

.chart-watermark { text-align:right; margin-top:10px; font-family:'DM Mono',monospace; font-size:7.5px; color:#d0cdc8; letter-spacing:1px; text-transform:uppercase; }

@media print {
  #editor      { display:none !important; }
  #output      { display:block !important; padding:0; }
  .print-bar   { display:none !important; }
  .no-print    { display:none !important; }
  body         { background:#fff; }
  /* Repeat header on every page via position:fixed */
  .out-header  { position:fixed; top:0; left:0; right:0; background:#fff; z-index:100;
                 padding:6px 0 10px; border-bottom:2px solid var(--text); }
  #output      { padding-top:72px !important; }
  /* Native table header repeat */
  .out-table thead { display:table-header-group; }
}
</style>
</head>
<body>
<nav class="suite-nav no-print">
  <div style="display:flex; align-items:center; gap:4px;">
    <a href="index.html" class="suite-home">
      <div class="suite-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </div>
      <span class="suite-wordmark">Bid Forecast</span>
    </a>
    <span class="suite-sep">/</span>
    <span class="suite-tool-name">DORcast</span>
  </div>
  <div class="suite-nav-right">
    <span id="suite-sync-badge" style="display:none;font-size:11px;color:var(--muted,#888);margin-right:8px;"></span>
    <input type="file" id="logo-input" accept="image/*" style="display:none" onchange="saveLogo(this)">
    <button class="pb-btn" onclick="document.getElementById('logo-input').click()" title="Upload logo &#8212; stored locally in your browser only">&#128444; Logo</button>
    <span id="logo-status" class="logo-status" style="display:none;">&#10003; Logo set</span>
    <button id="logo-clear" class="pb-btn" onclick="clearLogo()" style="display:none; color:#c0392b;">&#215; Remove</button>
  </div>
</nav>


<div class="modal-overlay" id="preset-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>Load Preset Template</h3>
    <p>Choose a starting template based on your project type. This will replace the current table.</p>
    <div class="modal-btns">
      <button class="modal-btn" onclick="loadPreset('turnkey')">
        Full Turnkey Substation
        <div class="modal-btn-sub">4 parties · 11 scope phases · 399 items · EPC structure</div>
      </button>
      <button class="modal-btn" onclick="loadPreset('offshore')">
        Offshore System
        <div class="modal-btn-sub">2 parties · simple X matrix · 258 items</div>
      </button>
      <button class="modal-btn" onclick="loadPreset('blank')">
        Blank — Start from scratch
        <div class="modal-btn-sub">Define your own parties and items</div>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════ EDITOR ══════════════════ -->
<div id="editor">
  
  <div class="config-bar">
    <span style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-right:4px;">Format</span>
    <button class="format-btn" onclick="setFormat('A4')" data-fmt="A4">A4 Landscape</button>
    <button class="format-btn active" onclick="setFormat('A3')" data-fmt="A3">A3 Landscape</button>
    <button class="format-btn" onclick="setFormat('screen')" data-fmt="screen">Screen Only</button>
    <div class="format-sep"></div>
    <button class="format-btn" onclick="openModal()" style="border-color:#7b4fa6;color:#7b4fa6;">⬇ Load Template</button>
  </div>

  <div class="persist-bar">
    <button class="pb-btn dash-btn" onclick="window.location.href='index.html'" title="Return to Suite Dashboard">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      ← Dashboard
    </button>
    <div class="pb-sep"></div>
    <label class="pb-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import Excel
      <input type="file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)">
    </label>
    <button class="pb-btn xl" onclick="exportExcel()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Export Excel
    </button>
    <div class="pb-sep"></div>
    <button class="pb-btn export" onclick="exportHTML()">Export HTML</button>
    <div class="pb-sep"></div>
    <button class="pb-btn" id="btn-undo" onclick="undo()" disabled title="Undo (Ctrl+Z)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
      Undo
    </button>
    <button class="pb-btn" id="btn-redo" onclick="redo()" disabled title="Redo (Ctrl+Y)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg>
      Redo
    </button>
    <span class="save-confirm" id="save-confirm">✓ Saved!</span>
  </div>

  <div class="section">
    <div class="section-title">Document Information</div>
    <div class="fields f3">
      <label>Title
        <input type="text" id="doc-title" value="Division of Responsibilities"
          oninput="const _v=this.value.trim();if(_v&&_v!=='Project Name'&&_v!=='Division of Responsibilities')SuiteManager.write({projectName:_v},'dorcast')">
      </label>
      <label>Revision <input type="text" id="doc-rev" value="Rev. 0"></label>
      <label>Date <input type="text" id="doc-date" value=""></label>

<script>
/* ── SUITE MANAGER ── */
const SuiteManager = (() => {
  const SYNC_KEY = 'bidcast_suite_sync';
  const LOGO_KEY = 'bidcast_logo';
  function read() { try { return JSON.parse(localStorage.getItem(SYNC_KEY) || '{}'); } catch { return {}; } }
  function write(patch, source) {
    try {
      const next = { ...read(), ...patch, _ts: Date.now(), _src: source };
      localStorage.setItem(SYNC_KEY, JSON.stringify(next));
      return next;
    } catch { return {}; }
  }
  function getLogo() { return localStorage.getItem(LOGO_KEY) || null; }
  function setLogo(dataUrl) { localStorage.setItem(LOGO_KEY, dataUrl); write({ _logoTs: Date.now() }, 'logo'); }
  function removeLogo() { localStorage.removeItem(LOGO_KEY); write({ _logoTs: Date.now() }, 'logo'); }
  function onUpdate(cb) {
    window.addEventListener('storage', e => {
      if (e.key === SYNC_KEY || e.key === LOGO_KEY) cb(read(), e.key);
    });
  }
  function updateBadge(el) {
    if (!el) return;
    const sync = read();
    if (sync._ts) {
      const s = Math.round((Date.now() - sync._ts) / 1000);
      el.textContent = '↻ Synced ' + (s < 5 ? 'just now' : s < 60 ? s + 's ago' : Math.round(s / 60) + 'm ago');
      el.style.display = 'inline';
    }
  }
  return { read, write, getLogo, setLogo, removeLogo, onUpdate, updateBadge };
})();

/* ── LOGO VAULT ── */
function saveLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { SuiteManager.setLogo(e.target.result); updateLogoUI(); };
  reader.readAsDataURL(file);
}
function clearLogo() {
  SuiteManager.removeLogo();
  const inp = document.getElementById('logo-input');
  if (inp) inp.value = '';
  updateLogoUI();
}
function updateLogoUI() {
  const logo = SuiteManager.getLogo();
  const st = document.getElementById('logo-status');
  const cl = document.getElementById('logo-clear');
  if (st) st.style.display = logo ? 'inline' : 'none';
  if (cl) cl.style.display = logo ? 'inline-flex' : 'none';
  const pl = document.getElementById('print-logo');
  if (pl) pl.innerHTML = logo ? `<img src="${logo}" style="height:36px;max-width:150px;object-fit:contain;display:block;">` : '';
}

/* ── SUITE SYNC ── */
function suiteWrite() {
  // DORCast contributes no unique data to the shared sync store.
  // projectName is written only on user input via the oninput handler.
}
function suiteRead(sync) {
  if (!sync) return;
  const dt = document.getElementById('doc-title');
  if (dt && sync.projectName && sync.projectName !== 'Project Name' && document.activeElement !== dt)
    dt.value = sync.projectName;
  updateLogoUI();
  SuiteManager.updateBadge(document.getElementById('suite-sync-badge'));
}

const PARTY_COLORS = ['#2c4e87','#c0392b','#b36a00','#3a7a52','#7b4fa6','#009999','#1a6b8a','#4a5568'];
const CYCLE_VALS = ['', 'X', 'n.a.'];

let currentFormat = 'A3';
let parties = [];
let rowCount = 0;
let partyCount = 0;

function setFormat(fmt) {
  currentFormat = fmt;
  document.querySelectorAll('.format-btn[data-fmt]').forEach(b => b.classList.toggle('active', b.dataset.fmt === fmt));
  const sizes = {A4:'A4 landscape', A3:'A3 landscape', screen:null};
  document.getElementById('page-size-style').textContent =
    sizes[fmt] ? `@page { size:${sizes[fmt]}; margin:8mm; }` : '';
}

// ── Parties ──
function addParty(data) {
  const id = partyCount++;
  const color = data.color || PARTY_COLORS[id % PARTY_COLORS.length];
  const chip = document.createElement('div');
  chip.className = 'party-chip';
  chip.dataset.pid = id;
  chip.innerHTML = `
    <input type="color" value="${color}" title="Party colour">
    <input type="text" value="${data.name||''}" placeholder="Party name" style="width:140px;">
    <button class="del-party" onclick="this.closest('.party-chip').remove();rebuildTableHead()">×</button>
  `;
  chip.querySelector('input[type="color"]').addEventListener('change', () => rebuildTableHead());
  chip.querySelector('input[type="text"]').addEventListener('input', () => rebuildTableHead());
  document.getElementById('parties-wrap').appendChild(chip);
  parties = getParties();
  rebuildTableHead();
}

function getParties() {
  return [...document.querySelectorAll('.party-chip')].map(c => ({
    id: c.dataset.pid,
    name: c.querySelector('input[type="text"]').value.trim(),
    color: c.querySelector('input[type="color"]').value,
  }));
}

function rebuildTableHead() {
  parties = getParties();
  const thead = document.getElementById('dor-thead');
  const hasComment = true;
  let html = '<tr>';
  html += '<th style="width:20px;"></th>';
  html += '<th class="th-num">No.</th>';
  html += '<th class="th-label">Item / Description</th>';
  parties.forEach(p => {
    html += `<th style="min-width:44px;color:${p.color}">${p.name||'—'}</th>`;
  });
  html += '<th class="th-freq" title="Count of active marks per row">Freq.</th>';
  html += '<th class="th-comment">Comments</th>';
  html += '<th style="width:22px;"></th></tr>';
  thead.innerHTML = html;
  // Update all existing mark cells
  document.querySelectorAll('.dor-row.row-item').forEach(tr => {
    syncMarkCells(tr);
  });
}

function syncMarkCells(tr) {
  const existing = {};
  tr.querySelectorAll('.mark-btn').forEach(b => {
    existing[b.dataset.pid] = b.dataset.val;
  });
  const markTd = tr.querySelector('.mark-cells-group');
  if (!markTd) return;
  markTd.innerHTML = '';
  parties.forEach(p => {
    const td = document.createElement('td');
    td.className = 'mark-cell';
    const val = existing[p.id] !== undefined ? existing[p.id] : '';
    const btn = document.createElement('button');
    btn.className = 'mark-btn';
    btn.dataset.pid = p.id;
    btn.dataset.val = val;
    btn.textContent = val || '·';
    btn.title = `Click to cycle: blank → X → n.a.`;
    btn.addEventListener('click', () => cycleVal(btn));
    td.appendChild(btn);
    markTd.appendChild(td);
  });
  updateFreqCell(tr);
}

function updateFreqCell(tr) {
  const fc = tr.querySelector('.freq-cell');
  if (!fc) return;
  const count = [...tr.querySelectorAll('.mark-btn')]
    .filter(b => b.dataset.val && b.dataset.val !== 'n.a.').length;
  fc.textContent = count || '—';
  fc.classList.toggle('zero', count === 0);
}

function cycleVal(btn) {
  const idx = CYCLE_VALS.indexOf(btn.dataset.val);
  const next = CYCLE_VALS[(idx + 1) % CYCLE_VALS.length];
  btn.dataset.val = next;
  btn.textContent = next || '·';
  updateFreqCell(btn.closest('tr.dor-row'));
}

// ── Rows ──
function insertRowAfter(refTr, data) {
  addRowAt(data, refTr);
}

function addRow(data, refTr) {
  addRowAt(data, refTr || null);
}

function addRowAt(data, refTr) {
  const tbody = document.getElementById('dor-body');
  const id = rowCount++;
  const tr = document.createElement('tr');
  tr.className = `dor-row row-${data.type}`;
  tr.dataset.rid = id;
  tr.dataset.type = data.type;
  tr.draggable = true;
  initRowDrag(tr);

  // drag(1) + num(1) + label(1) + parties(N) + freq(1) + comment(1) + del(1) = N+6
  // section/subsection span everything between drag and del = N+4
  const midSpan = parties.length + 4;

  if (data.type === 'section') {
    tr.innerHTML = `
      <td><span class="drag-handle">⠿</span></td>
      <td colspan="${midSpan}">
        <input class="row-label-inp" type="text" value="${esc(data.label||'')}" placeholder="Section heading (e.g. 1. Administration)" style="font-weight:700;color:var(--accent);">
      </td>
      <td><button class="btn-del-row" onclick="deleteRow(this)" title="Delete">×</button></td>`;
  } else if (data.type === 'subsection') {
    tr.innerHTML = `
      <td><span class="drag-handle">⠿</span></td>
      <td colspan="${midSpan}">
        <input class="row-label-inp" type="text" value="${esc(data.label||'')}" placeholder="Subsection (e.g. 1.1. Business Setup)" style="font-weight:600;color:var(--muted);padding-left:12px;">
      </td>
      <td><button class="btn-del-row" onclick="deleteRow(this)" title="Delete">×</button></td>`;
  } else {
    tr.innerHTML = `
      <td><span class="drag-handle">⠿</span></td>
      <td><input class="row-num-inp" type="text" value="${esc(data.num||'')}" placeholder="1.1.1"></td>
      <td><input class="row-label-inp" type="text" value="${esc(data.label||'')}" placeholder="Item description"></td>
      <td class="mark-cells-group" style="display:contents;"></td>
      <td class="freq-cell zero">—</td>
      <td><input class="row-comment-inp" type="text" value="${esc(data.comment||'')}" placeholder="Comment..."></td>
      <td><button class="btn-del-row" onclick="deleteRow(this)">×</button></td>`;
  }

  // Insert after refTr (and its insert-row), or append
  const insRow = createInsertRow(tr);
  if (refTr) {
    // refTr may be a .dor-row — insert after its following .insert-row if present
    const nextInsert = refTr.nextElementSibling?.classList.contains('insert-row')
      ? refTr.nextElementSibling : refTr;
    nextInsert.after(tr);
    tr.after(insRow);
  } else {
    tbody.appendChild(tr);
    tbody.appendChild(insRow);
  }

  if (data.type === 'item') {
    syncMarkCells(tr);
    if (data.marks && parties.length) {
      const btns = tr.querySelectorAll('.mark-btn');
      btns.forEach((btn, i) => {
        const val = data.marks[i] || '';
        btn.dataset.val = val;
        btn.textContent = val || '·';
      });
    }
  }
}

function deleteRow(btn) {
  const tr = btn.closest('tr');
  const next = tr.nextElementSibling;
  if (next?.classList.contains('insert-row')) next.remove();
  tr.remove();
}

function createInsertRow(siblingTr) {
  const ins = document.createElement('tr');
  ins.className = 'insert-row';
  const td = document.createElement('td');
  td.colSpan = 99;
  td.innerHTML = `<div class="insert-trigger">
    <button class="ins-btn ins-s"  onclick="insertRowAfter(this.closest('.insert-row').previousElementSibling, {type:'section'})">+ Section</button>
    <span class="ins-sep">|</span>
    <button class="ins-btn ins-ss" onclick="insertRowAfter(this.closest('.insert-row').previousElementSibling, {type:'subsection'})">+ Subsection</button>
    <span class="ins-sep">|</span>
    <button class="ins-btn ins-i"  onclick="insertRowAfter(this.closest('.insert-row').previousElementSibling, {type:'item'})">+ Item</button>
  </div>`;
  ins.appendChild(td);
  return ins;
}


function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── Drag ──
let dragSrc = null;
function initRowDrag(tr) {
  tr.addEventListener('dragstart', e => { dragSrc=tr; tr.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  tr.addEventListener('dragend',   () => { dragSrc=null; document.querySelectorAll('.dor-row').forEach(r=>r.classList.remove('dragging','drag-over')); });
  tr.addEventListener('dragover',  e => { e.preventDefault(); if(dragSrc&&dragSrc!==tr){document.querySelectorAll('.dor-row').forEach(r=>r.classList.remove('drag-over')); tr.classList.add('drag-over');} });
  tr.addEventListener('drop',      e => { e.preventDefault(); if(!dragSrc||dragSrc===tr)return; tr.parentNode.insertBefore(dragSrc,tr); tr.classList.remove('drag-over'); });
}

// ── Collect state ──
function getRows() {
  return [...document.querySelectorAll('#dor-body tr.dor-row')].map(tr => {
    const type = tr.dataset.type;
    if (type === 'section' || type === 'subsection') {
      return { type, label: tr.querySelector('.row-label-inp').value };
    }
    const marks = [...tr.querySelectorAll('.mark-btn')].map(b => b.dataset.val);
    return {
      type: 'item',
      num:     tr.querySelector('.row-num-inp')?.value || '',
      label:   tr.querySelector('.row-label-inp')?.value || '',
      marks,
      comment: tr.querySelector('.row-comment-inp')?.value || '',
    };
  });
}

function collectState() {
  return {
    version: '1.0',
    format:  currentFormat,
    title:   document.getElementById('doc-title').value,
    rev:     document.getElementById('doc-rev').value,
    date:    document.getElementById('doc-date').value,
    parties: getParties(),
    rows:    getRows(),
  };
}

function applyState(s) {
  document.getElementById('doc-title').value = s.title||'';
  document.getElementById('doc-rev').value   = s.rev  ||'';
  document.getElementById('doc-date').value  = s.date ||'';
  if (s.format) setFormat(s.format);
  document.getElementById('parties-wrap').innerHTML = '';
  partyCount = 0;
  (s.parties||[]).forEach(p => addParty(p));
  document.getElementById('dor-body').innerHTML = '';
  rowCount = 0;
  (s.rows||[]).forEach(r => addRow(r));
}

// ── Generate ──
function generate() {
  const state = collectState();
  document.getElementById('out-title').textContent = state.title;
  document.getElementById('out-sub').textContent   = '';
  document.getElementById('out-meta').innerHTML    = `${state.rev}${state.date?'<br>'+state.date:''}`;

  const table = document.getElementById('out-table');
  const hasComment = state.rows.some(r => r.type==='item' && r.comment);
  // Total cols for section span: label + parties + freq + comment(opt)
  const totalMidCols = 1 + state.parties.length + 1 + (hasComment ? 1 : 0);
  let html = '<thead><tr>';
  html += '<th class="th-label" style="text-align:left;">Item / Description</th>';
  state.parties.forEach(p => { html += `<th style="color:${p.color};min-width:36px;">${p.name}</th>`; });
  html += '<th class="th-freq" title="Active marks per row">Freq.</th>';
  if (hasComment) html += '<th class="th-comment">Comments</th>';
  html += '</tr></thead><tbody>';

  state.rows.forEach(r => {
    if (r.type === 'section') {
      html += `<tr class="out-row-section"><td colspan="${totalMidCols}">${r.label}</td></tr>`;
    } else if (r.type === 'subsection') {
      html += `<tr class="out-row-sub"><td colspan="${totalMidCols}" style="padding-left:14px;">${r.label}</td></tr>`;
    } else {
      const marks = r.marks || [];
      const freq  = marks.filter(m => m && m !== 'n.a.').length;
      html += '<tr class="out-row-item">';
      html += `<td><span class="out-num">${r.num}</span> ${r.label}</td>`;
      marks.forEach((m, i) => {
        const p = state.parties[i];
        let cls = 'out-mark';
        if (m==='X')         cls += ' out-mark-x';
        else if (m==='n.a.') cls += ' out-mark-na';
        else if (m)          cls += ' out-mark-text';
        html += `<td class="${cls}" style="color:${m==='X'?(p?.color||'var(--mark-x)'):''};">${m||''}</td>`;
      });
      html += `<td class="out-freq${freq===0?' zero':''}">${freq||'—'}</td>`;
      if (hasComment) html += `<td class="out-comment">${r.comment||''}</td>`;
      html += '</tr>';
    }
  });
  html += '</tbody>';
  table.innerHTML = html;

  // Legend
  const legend = document.getElementById('out-legend');
  legend.innerHTML = `
    <div class="out-li"><div class="out-ld" style="background:#dde8f7;color:var(--mark-x);">X</div> Responsible</div>
    <div class="out-li"><div class="out-ld" style="background:#f0ede8;color:var(--mark-na);font-size:7px;">n.a.</div> Not Applicable</div>
    <div class="out-li"><div class="out-ld" style="background:#f5f4f0;"></div> Not Responsible</div>`;

  document.getElementById('editor').style.display = 'none';
  document.getElementById('output').style.display  = 'block';
  window.scrollTo(0,0);
}

function goBack() {
  document.getElementById('output').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
}

// ── Presets ──
function openModal()  { document.getElementById('preset-modal').classList.add('open'); }
function closeModal() { document.getElementById('preset-modal').classList.remove('open'); }

function loadPreset(type) {
  closeModal();
  if (type === 'blank') {
    document.getElementById('dor-body').innerHTML = '';
    document.getElementById('parties-wrap').innerHTML = '';
    rowCount = partyCount = 0;
    addParty({name:'Client',      color:'#c0392b'});
    addParty({name:'Contractor',  color:'#2c4e87'});
    return;
  }
  const preset = type === 'turnkey' ? PRESET_TURNKEY : PRESET_OFFSHORE;
  document.getElementById('dor-body').innerHTML = '';
  document.getElementById('parties-wrap').innerHTML = '';
  rowCount = partyCount = 0;
  preset.parties.forEach((name,i) => addParty({name, color:PARTY_COLORS[i%PARTY_COLORS.length]}));
  preset.items.forEach(item => addRow(item));
  document.getElementById('doc-title').value = type==='turnkey' ? 'Division of Responsibilities — Full Turnkey Substation' : 'Division of Responsibilities — Offshore System';
}

// ── Save / Load / Export ──
function _suiteBundle(ownState) {
  const suite = { _suite:true, _version:1, _savedAt:new Date().toISOString(), _savedFrom:'dorcast' };
  ['timecast','resourcecast','orgcast','rfqcast','dorcast'].forEach(k => {
    const raw = localStorage.getItem('bidcast_state_' + k);
    suite[k] = raw ? JSON.parse(raw) : null;
  });
  suite.dorcast = ownState;
  return suite;
}

function saveJSON() {
  const state = collectState();
  localStorage.setItem('bidcast_state_dorcast', JSON.stringify(state));
  const name  = (state.title||'dor').replace(/[^a-z0-9_-]/gi,'_').toLowerCase();
  const blob  = new Blob([JSON.stringify(_suiteBundle(state),null,2)],{type:'application/json'});
  const a     = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name+'_suite.json'; a.click();
  URL.revokeObjectURL(a.href);
  const c=document.getElementById('save-confirm');
  c.style.display='inline'; setTimeout(()=>c.style.display='none',2000);
}

function loadJSON(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const data = JSON.parse(e.target.result);
      if (data._suite) {
        ['timecast','resourcecast','orgcast','rfqcast','dorcast'].forEach(k => {
          if (k !== 'dorcast' && data[k]) localStorage.setItem('bidcast_state_' + k, JSON.stringify(data[k]));
        });
        if (data.dorcast) applyState(data.dorcast);
        else alert('No DORCast data found in this suite file.');
      } else { applyState(data); }
    } catch(err) { alert('Invalid .json file.'); }
  };
  reader.readAsText(file); input.value='';
}

function exportHTML() {
  const state   = collectState();
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  const src     = document.documentElement.outerHTML;
  const inject  = ['<scr','ipt>','window.addEventListener("DOMContentLoaded",function(){var s=JSON.parse(decodeURIComponent(escape(atob("',encoded,'"))));applyState(s);});','</scr','ipt>'].join('');
  const out     = src.replace('</body>',inject+'\n</body>');
  const name    = (state.title||'dor').replace(/[^a-z0-9_-]/gi,'_').toLowerCase();
  const blob    = new Blob([out],{type:'text/html'});
  const a       = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name+'_dorcast.html'; a.click();
  URL.revokeObjectURL(a.href);
}

// ── Excel Import ──
function importExcel(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[wb.SheetNames.length-1]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(!data.length){alert('Empty sheet.');return;}

    // Auto-detect header row (first row with multiple filled cells)
    let hRow=0;
    for(let i=0;i<Math.min(5,data.length);i++){
      if(data[i].filter(v=>v).length>2){hRow=i;break;}
    }
    const headers=data[hRow];
    // Find party columns (non-empty headers after first 4)
    const partyIdxs=[];
    headers.forEach((h,i)=>{if(i>=4&&h&&typeof h==='string'&&h.length<30&&!h.toLowerCase().includes('comment'))partyIdxs.push({i,name:String(h).split('\n')[0].trim()});});
    const commentIdx=headers.findIndex(h=>h&&String(h).toLowerCase().includes('comment'));

    document.getElementById('dor-body').innerHTML='';
    document.getElementById('parties-wrap').innerHTML='';
    rowCount=partyCount=0;
    partyIdxs.forEach((p,i)=>addParty({name:p.name,color:PARTY_COLORS[i%PARTY_COLORS.length]}));

    data.slice(hRow+1).forEach(row=>{
      if(!row.some(v=>v)) return;
      const c0=row[0],c1=row[1],c2=row[2],c3=row[3];
      if(c0&&!c1) { addRow({type:'section',label:String(c0).trim()}); return; }
      if(c1&&!c2) { addRow({type:'subsection',label:String(c1).trim()}); return; }
      if(c3){
        const marks=partyIdxs.map(p=>{ const v=row[p.i]; return v==='X'?'X':(v&&String(v).toLowerCase()==='n.a.'?'n.a.':v?String(v).trim():''); });
        const comment=commentIdx>=0?String(row[commentIdx]||'').trim():'';
        addRow({type:'item',num:String(c2||'').trim(),label:String(c3).trim(),marks,comment});
      }
    });
    alert(`Imported ${document.querySelectorAll('.dor-row.row-item').length} items with ${partyIdxs.length} parties.`);
  };
  reader.readAsBinaryString(file); input.value='';
}

// ── Excel Export ──
function exportExcel() {
  const state=collectState();
  const wb=XLSX.utils.book_new();
  const wsData=[];

  // Header
  const hRow=['No.','Description',...state.parties.map(p=>p.name),'Comments'];
  wsData.push(hRow);

  state.rows.forEach(r=>{
    if(r.type==='section')    { wsData.push([r.label]); }
    else if(r.type==='subsection') { wsData.push(['',r.label]); }
    else {
      const row=[r.num,r.label,...(r.marks||state.parties.map(()=>'')),r.comment||''];
      wsData.push(row);
    }
  });

  const ws=XLSX.utils.aoa_to_sheet(wsData);
  // Column widths
  ws['!cols']=[{wch:8},{wch:50},...state.parties.map(()=>({wch:14})),{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'DoR');
  const name=(state.title||'dor').replace(/[^a-z0-9_-]/gi,'_').toLowerCase();
  XLSX.writeFile(wb,name+'_dorcast.xlsx');
}

// ── Undo / Redo ──
let _hist = [], _histIdx = -1, _suppHist = false, _histTimer = null;

function _snapshot() {
  if (_suppHist) return;
  const s = JSON.stringify(collectState());
  if (_hist[_histIdx] === s) return;
  _hist = _hist.slice(0, _histIdx + 1);
  _hist.push(s);
  if (_hist.length > 50) _hist.shift(); else _histIdx++;
  _syncUndoUI();
  localStorage.setItem('bidcast_state_dorcast', s);
}
function _scheduleSnap() {
  if (_suppHist) return;
  clearTimeout(_histTimer); _histTimer = setTimeout(_snapshot, 800);
}
function undo() {
  clearTimeout(_histTimer);
  if (_histIdx <= 0) return;
  _suppHist = true; _histIdx--;
  applyState(JSON.parse(_hist[_histIdx]));
  _suppHist = false; _syncUndoUI();
}
function redo() {
  clearTimeout(_histTimer);
  if (_histIdx >= _hist.length - 1) return;
  _suppHist = true; _histIdx++;
  applyState(JSON.parse(_hist[_histIdx]));
  _suppHist = false; _syncUndoUI();
}
function _syncUndoUI() {
  const u = document.getElementById('btn-undo'), r = document.getElementById('btn-redo');
  if (u) u.disabled = _histIdx <= 0;
  if (r) r.disabled = _histIdx >= _hist.length - 1;
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});
(function() {
  const _rawApply = applyState;
  applyState = s => { _suppHist = true; _rawApply(s); _suppHist = false; };
  const ed = document.getElementById('editor');
  if (ed) {
    new MutationObserver(() => {
      if (_suppHist) return;
      clearTimeout(_histTimer); _histTimer = setTimeout(_snapshot, 400);
    }).observe(ed, { childList: true, subtree: true });
    ed.addEventListener('input', _scheduleSnap);
  }
  setTimeout(_snapshot, 300);
})();
